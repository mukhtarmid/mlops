apiVersion: apps/v1

kind: Deployment

metadata:
  name: iris-api

spec:

  replicas: 2

  selector:
    matchLabels:
      app: iris-api

  template:

    metadata:
      labels:
        app: iris-api

    spec:

      containers:

        - name: iris-api

          image: ghcr.io/mukhtarmid/iris-api:latest

          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-service:5000"
          
          ports:
            - containerPort: 8000

          livenessProbe:

            httpGet:

              path: /health

              port: 8000

            initialDelaySeconds: 10

            periodSeconds: 5

          readinessProbe:

            httpGet:

              path: /health

              port: 8000

            initialDelaySeconds: 5